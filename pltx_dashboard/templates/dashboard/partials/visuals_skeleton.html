<div class="dashboard-skeleton-section visuals-skeleton" aria-hidden="true">
    <div class="ceo-row-2-cols">
        <div class="ceo-card dashboard-skeleton-card">
            <div class="ceo-card-header dashboard-skeleton-header">
                <div class="dashboard-skeleton-heading">
                    <div class="kpi-skeleton-line dashboard-skeleton-title"></div>
                    <div class="kpi-skeleton-line dashboard-skeleton-subtitle"></div>
                </div>
                <div class="dashboard-skeleton-tabs">
                    <div class="kpi-skeleton-line dashboard-skeleton-tab"></div>
                    <div class="kpi-skeleton-line dashboard-skeleton-tab"></div>
                    <div class="kpi-skeleton-line dashboard-skeleton-tab"></div>
                </div>
            </div>
            <div class="ceo-card-body">
                <div class="dashboard-skeleton-legend">
                    <div class="kpi-skeleton-line dashboard-skeleton-legend-item"></div>
                    <div class="kpi-skeleton-line dashboard-skeleton-legend-item"></div>
                </div>
                <div class="dashboard-skeleton-chart">
                    <div class="dashboard-skeleton-chart-line line-a"></div>
                    <div class="dashboard-skeleton-chart-line line-b"></div>
                    <div class="dashboard-skeleton-chart-axis"></div>
                </div>
            </div>
        </div>

        <div class="ceo-card dashboard-skeleton-card">
            <div class="ceo-card-header dashboard-skeleton-header">
                <div class="dashboard-skeleton-heading">
                    <div class="kpi-skeleton-line dashboard-skeleton-title short"></div>
                    <div class="kpi-skeleton-line dashboard-skeleton-subtitle"></div>
                </div>
            </div>
            <div class="ceo-card-body">
                <div class="dashboard-skeleton-donut-wrap">
                    <div class="dashboard-skeleton-donut"></div>
                </div>
                <div class="dashboard-skeleton-list compact">
                    {% for _ in "123" %}
                    <div class="dashboard-skeleton-list-row">
                        <div class="kpi-skeleton-line dashboard-skeleton-avatar"></div>
                        <div class="kpi-skeleton-line dashboard-skeleton-list-main"></div>
                        <div class="kpi-skeleton-line dashboard-skeleton-list-value"></div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <div class="biz-row-3-equal">
        {% for _ in "123" %}
        <div class="ceo-card dashboard-skeleton-card">
            <div class="ceo-card-header dashboard-skeleton-header">
                <div class="dashboard-skeleton-heading">
                    <div class="kpi-skeleton-line dashboard-skeleton-title"></div>
                    <div class="kpi-skeleton-line dashboard-skeleton-subtitle"></div>
                </div>
                <div class="kpi-skeleton-line dashboard-skeleton-button"></div>
            </div>
            <div class="ceo-card-body">
                <div class="dashboard-skeleton-list">
                    {% for _ in "12345" %}
                    <div class="dashboard-skeleton-list-row">
                        <div class="kpi-skeleton-line dashboard-skeleton-list-main"></div>
                        <div class="kpi-skeleton-line dashboard-skeleton-list-value"></div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
