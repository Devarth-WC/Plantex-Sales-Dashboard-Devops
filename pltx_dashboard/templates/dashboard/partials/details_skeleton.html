<div class="dashboard-skeleton-section details-skeleton" aria-hidden="true">
    <div class="ceo-card dashboard-skeleton-card dashboard-skeleton-table-card">
        <div class="ceo-card-header dashboard-skeleton-header">
            <div class="dashboard-skeleton-heading">
                <div class="kpi-skeleton-line dashboard-skeleton-title"></div>
                <div class="kpi-skeleton-line dashboard-skeleton-subtitle"></div>
            </div>
            <div class="kpi-skeleton-line dashboard-skeleton-search"></div>
        </div>
        <div class="ceo-card-body no-pad">
            <table class="ceo-table dashboard-skeleton-table">
                <thead>
                    <tr>
                        <th><div class="kpi-skeleton-line dashboard-skeleton-th"></div></th>
                        <th><div class="kpi-skeleton-line dashboard-skeleton-th"></div></th>
                        <th><div class="kpi-skeleton-line dashboard-skeleton-th"></div></th>
                        <th><div class="kpi-skeleton-line dashboard-skeleton-th"></div></th>
                        <th><div class="kpi-skeleton-line dashboard-skeleton-th"></div></th>
                    </tr>
                </thead>
                <tbody>
                    {% for _ in "12345678" %}
                    <tr>
                        <td><div class="kpi-skeleton-line dashboard-skeleton-cell wide"></div></td>
                        <td><div class="kpi-skeleton-line dashboard-skeleton-cell"></div></td>
                        <td><div class="kpi-skeleton-line dashboard-skeleton-cell"></div></td>
                        <td><div class="kpi-skeleton-line dashboard-skeleton-cell short"></div></td>
                        <td><div class="kpi-skeleton-line dashboard-skeleton-cell"></div></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div class="dashboard-skeleton-pagination">
                <div class="kpi-skeleton-line dashboard-skeleton-page-info"></div>
                <div class="kpi-skeleton-line dashboard-skeleton-page-btn"></div>
                <div class="kpi-skeleton-line dashboard-skeleton-page-btn"></div>
            </div>
        </div>
    </div>
</div>
